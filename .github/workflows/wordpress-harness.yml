name: WordPress Harness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.env.wordpress.example'
      - '.github/workflows/wordpress-harness.yml'
      - 'docker-compose.wordpress.yml'
      - 'docs/WORDPRESS_*.md'
      - 'package.json'
      - 'tools/wordpress/**'
      - 'wordpress/**'

jobs:
  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local env
        run: cp .env.wordpress.example .env.wordpress

      - name: Validate compose file
        run: docker compose -f docker-compose.wordpress.yml --env-file .env.wordpress config

  script-parse:
    name: Parse WordPress scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts parse
        run: |
          bash -n tools/wordpress/bootstrap.sh
          bash -n tools/wordpress/install-plugin-zip.sh
          bash -n tools/wordpress/install-theme-zip.sh
          bash -n tools/wordpress/lib.sh
          bash -n tools/wordpress/report.sh
          bash -n tools/wordpress/reset.sh
          bash -n tools/wordpress/smoke-test.sh
          bash -n tools/wordpress/status.sh

      - name: Check manifest runner syntax
        run: node --check tools/wordpress/run-manifest.mjs

      - name: Validate product manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('wordpress/products.example.json', 'utf8'))"
