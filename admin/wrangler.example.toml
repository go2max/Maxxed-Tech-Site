name = "maxxed-admin-platform"
main = "src/worker-entry.mjs"
compatibility_date = "2026-06-25"

routes = [
  { pattern = "admin.techmaxxed.com", custom_domain = true }
]

[vars]
ADMIN_ENV = "production"
ADMIN_PUBLIC_HOST = "admin.techmaxxed.com"
ADMIN_REQUIRE_ACCESS = "true"
ADMIN_ALLOW_MOCK_IDENTITY = "false"
ADMIN_ALLOWED_EMAIL_DOMAINS = "techmaxxed.com"

[[d1_databases]]
binding = "ADMIN_DB"
database_name = "maxxed-admin-platform"
database_id = "replace-with-cloudflare-d1-database-id"

[[r2_buckets]]
binding = "ADMIN_EVIDENCE_BUCKET"
bucket_name = "maxxed-admin-evidence"
