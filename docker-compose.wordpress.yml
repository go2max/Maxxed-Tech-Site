services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WP_DB_NAME:-wordpress}
      MYSQL_USER: ${WP_DB_USER:-wordpress}
      MYSQL_PASSWORD: ${WP_DB_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD:-rootwordpress}
    ports:
      - "${WP_DB_PORT:-3307}:3306"
    volumes:
      - maxxed_wp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.6-php8.3-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:-wordpress}
      WORDPRESS_DEBUG: ${WP_DEBUG:-1}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
    ports:
      - "${WP_PORT:-8080}:80"
    volumes:
      - maxxed_wp_site_data:/var/www/html
      - ./wordpress/plugins:/var/www/html/wp-content/plugins/maxxed-local
      - ./wordpress/themes:/var/www/html/wp-content/themes/maxxed-local
      - ./wordpress/uploads:/var/www/html/wp-content/uploads

  wpcli:
    image: wordpress:cli-php8.3
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "33:33"
    working_dir: /var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WP_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:-wordpress}
    volumes:
      - maxxed_wp_site_data:/var/www/html
      - ./wordpress/plugins:/var/www/html/wp-content/plugins/maxxed-local
      - ./wordpress/themes:/var/www/html/wp-content/themes/maxxed-local
      - ./wordpress/uploads:/var/www/html/wp-content/uploads
    entrypoint: ["wp"]

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${WP_DB_ROOT_PASSWORD:-rootwordpress}
    ports:
      - "${WP_PMA_PORT:-8081}:80"

volumes:
  maxxed_wp_db_data:
  maxxed_wp_site_data:
