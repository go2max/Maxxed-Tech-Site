<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1500" role="img" aria-labelledby="title desc">
  <title id="title">Maxxed Technical Systems product suite artwork</title>
  <desc id="desc">A branded visual showing Maxxed app cards for remote control, compass, measurement, fishing, gold estimating, and party games.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0b2234"/><stop offset="0.52" stop-color="#0a1724"/><stop offset="1" stop-color="#07131f"/></linearGradient>
    <linearGradient id="cyan" x1="0" x2="1"><stop stop-color="#25d0d8"/><stop offset="1" stop-color="#b9ed45"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000" flood-opacity="0.38"/></filter>
  </defs>
  <rect width="1080" height="1500" rx="56" fill="url(#bg)"/>
  <circle cx="170" cy="160" r="210" fill="#25d0d8" opacity="0.17"/>
  <circle cx="940" cy="1340" r="270" fill="#b9ed45" opacity="0.13"/>
  <path d="M120 360 C310 230 520 250 730 350 S1000 520 930 720 C870 900 660 850 500 990 S210 1240 110 1040 C20 860 20 520 120 360Z" fill="none" stroke="url(#cyan)" stroke-width="7" opacity="0.34"/>
  <g filter="url(#shadow)">
    <rect x="140" y="135" width="800" height="1180" rx="54" fill="#0e1e2b" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
    <rect x="184" y="206" width="712" height="230" rx="34" fill="#122b3c"/>
    <text x="224" y="282" fill="#b9ed45" font-family="Inter,Arial,sans-serif" font-size="32" font-weight="800" letter-spacing="3">MAXXED SUITE</text>
    <text x="224" y="342" fill="#f4f7f8" font-family="Inter,Arial,sans-serif" font-size="58" font-weight="900">Apps built for real tasks.</text>
    <text x="224" y="394" fill="#a9b7be" font-family="Inter,Arial,sans-serif" font-size="28">Control, measure, navigate, record, estimate, and compete.</text>
    <g font-family="Inter,Arial,sans-serif" font-weight="900" font-size="28">
      <rect x="184" y="492" width="330" height="176" rx="28" fill="#102836" stroke="#25d0d8" stroke-opacity="0.45"/><text x="220" y="570" fill="#25d0d8">TV</text><text x="220" y="617" fill="#f4f7f8">Remote control</text>
      <rect x="566" y="492" width="330" height="176" rx="28" fill="#152a25" stroke="#b9ed45" stroke-opacity="0.45"/><text x="602" y="570" fill="#b9ed45">N</text><text x="602" y="617" fill="#f4f7f8">Compass</text>
      <rect x="184" y="720" width="330" height="176" rx="28" fill="#2b1b1b" stroke="#ff715b" stroke-opacity="0.45"/><text x="220" y="798" fill="#ff715b">↔</text><text x="220" y="845" fill="#f4f7f8">Measure</text>
      <rect x="566" y="720" width="330" height="176" rx="28" fill="#28210f" stroke="#ffc44d" stroke-opacity="0.45"/><text x="602" y="798" fill="#ffc44d">Au</text><text x="602" y="845" fill="#f4f7f8">Gold estimate</text>
      <rect x="184" y="948" width="330" height="176" rx="28" fill="#0e2534" stroke="#47b7ff" stroke-opacity="0.45"/><text x="220" y="1026" fill="#47b7ff">FM</text><text x="220" y="1073" fill="#f4f7f8">Fishing log</text>
      <rect x="566" y="948" width="330" height="176" rx="28" fill="#2b1730" stroke="#ff5fb7" stroke-opacity="0.45"/><text x="602" y="1026" fill="#ff5fb7">RR</text><text x="602" y="1073" fill="#f4f7f8">Party arcade</text>
    </g>
    <rect x="224" y="1190" width="632" height="78" rx="39" fill="#b9ed45"/><text x="310" y="1242" fill="#07131f" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="900">Privacy-aware. Honest. Useful.</text>
  </g>
</svg>
